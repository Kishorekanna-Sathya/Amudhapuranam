chapters:

  - id: valli
    timeline: 1
    titleEn: Valli
    title: வள்ளி
    location: Kittangudi
    characters:
      - valli
      - amudhan
      - jeya
      - vasu
    content: |
      கல்லடிபட்ட தேன்கூட்டிலிருந்து சிதறிப் பறக்கும் தேனீக்கள் போல், எப்போதும் அங்கேயும் இங்கேயும் மோதிக்கொண்டே ஓடும் வாகனங்களும், சாலையின் கூட்ட நெரிசலும் கண்டே வளர்ந்தவன் நான். ஆனால் இன்று, இப்போது ஆள் நடமாட்டமே இல்லாத ஒற்றை அடிப்பாதை கொண்ட இந்தக் கருவேலங்காட்டில் நடந்து செல்வது என்னோடு எந்தவிதத்திலும் பொருந்தாத ஒன்றாக இருந்தது. இந்த மழைக்காலமே இங்கு வெயில் காலம் போல் கொளுத்துகிறதே, அப்படியானால் கோடை காலம் எப்படி இருக்குமோ என்று நினைக்கவே பயமாக இருந்தது. நல்லவேளை அரையாண்டுப் பரீட்சையின் விடுமுறையில் வந்திருந்தேன். முழுப்பரீட்சை விடுமுறையில் வந்திருந்தால் என்னவாகி இருப்பேனோ என்று தெரியவில்லை. விடுமுறை முடிந்து திரும்பியதும் தமிழ் வாத்தியார் எப்படியோ விடுமுறையைப் பற்றி கட்டுரை எழுதச் சொல்வார். அப்போது "நானும் வாசுவும் கிட்டாங்குடியும்" என்ற தலைப்பில் ஒரு கதை எழுத எனக்கு நிறைய சரக்கு இருக்கும் என்று தோன்றியது. வீட்டிலிருந்து கிளம்பி ரெண்டு மைல் நடந்து வந்தாயிட்டு, இந்த வாசு என்னை எங்கே தான் இழுத்துக்கொண்டு போகிறானோ என்று புரியவில்லை.
      "டேய்… வாசு… நில்ரா!"
      "வேசயா வா டா!"
      "இன்னும் எவ்வளோ தூரம்?"
      "வந்தாச்சு வா, இன்னும் அஞ்சு நிமிஷம் தான்."
      நான் ஒரு கணம் நின்றேன். கால்கள் இனி கேட்கவில்லை என்று சொல்வது போல் இருந்தன.
      "ஒரு நிமிஷம் வாசு, உக்காந்துட்டுப் போலாம் இரு. என்னால சுத்தமா முடிலா."
      "சரி, அந்த மரத்தடிலே செப்பலை களைஞ்சு விட்டு அது மேலே உக்காரு. முள்ளு எதாவது குத்திடும், கவனமா இரு."
      "அது என்ன ஊர் பெயர், கிட்டங்குடி?"
      "யாருக்குத் தெரியும்."
      "நாம்ம எப்போ திரும்பி போவோம்?"
      "சாயங்காலம் வரைக்கும் விளையாடிவிட்டு, அப்றம் போலாம்."
      "வீட்டுக்கு இல்ல, ஊருக்கு எப்போ போவோம்?"
      "ரெண்டு மைல் நடக்க வெச்சதுக்கே ஊருக்கு திரும்பிப் போகப் பாக்கிறியா? மாவீரர் அமுதனே, அவ்வளோ ரோஷமனாவரா நீங்க?" (என்று சிரித்தான்)
      "இல்ல, அதுக்கு இல்ல."
      "வேற எதுக்கு?"
      நான் கொஞ்சம் தயங்கினேன்.
      "காலைல நான் குளிச்சுட்டு இருக்கும்போது, வெளியே யாரோ உங்க அம்மா கிட்ட பேசிட்டு இருந்தாங்க."
      "என்னன்னு?"
      "ஜெயா குத்தாவெச்சு முழுசா மூணு மாசம் ஆகலா, அதுக்குள்ள விருந்தாளியா எதேதோ பையன வீட்டுலே தங்கவிடுற? அந்தப் பையன் கெளம்பற வரைக்கும் ஜெயா வேணா எங்க வீட்டுலே தூங்கட்டும், வள்ளி துணைக்கு இருக்காள், நீ அனுப்பிவிடு - அப்படீன்னு."
      "அது அந்தக் கெழவிய தான் டா. அதுக்கு இதே வேளை தான். ஜெயா வயசுக்கு வந்தப்போவே அதை கூப்பிட்டு வெச்சு எதேதோ புத்திமதி சொல்லிச்சு. கண்டுக்காத விடு."
      "அது சரி தான் டா. ஆனா உங்க அம்மா என்ன பதில் சொன்னாங்கன்னு எனக்குத் தெரியல, அதுதான்.. பேசாம நான் ரெண்டு நாள் கழிச்சு கெளம்பிடவா?"
      "அம்மா அப்படி ஏதாவது நினைச்சிருந்தா, உன்னை இங்க கூட்டி வரவே ஏதாவது சொல்லிருக்கணும். அவங்க சந்தோஷமா தான் கூப்பிட்டாங்க. நாம்ம பேசுன மாதிரி லீவு முடியற வரை இருந்துட்டுப் போலாம். நீ எந்திரி நட, போலாம்."
      இருவரும் மறுபடியும் நடக்கத் தொடங்கினோம். சற்று நேரம் கழித்து நான் கேட்டேன்,
      "சரி டா, அப்றம் யாரா அது வள்ளி?"
      "அது கனகா டா, கனகவள்ளி. ஏன் கேக்கற?"
      "சும்மா கேட்டேன். உன் தங்கச்சியை பாத்துற அளவுக்கு அவ பெரியமனுசியா?"
      "அப்படி எல்லாம் இல்ல. நம்ம வயசு தான் இருக்கும். சின்ன வயசுலே இருந்தே ஒன்னா தான் வளர்ந்தாங்க."
      "அது ஏன் நீயும் அப்பாவும் அங்க, அம்மாவும் ஜெயாவும் தாத்தா பாட்டியும் இங்க?"
      "இங்க அப்பாவுக்கு வேலை கிடைக்கலா. ஆனா அம்மா கான்ட்ராக்ட்லே இருக்காங்க. அதன் ஆளுக்கு ஒரு பக்கம். தோ, அங்க ஓடஞ்ச வீடு தெரியுதா? அதன் பழைய போஸ்ட்பூத். இப்போ அங்கே கேரம் போர்டு, சீட்டு ஆட்டம்னு ஊரு பயலுக எல்லாரும் கூடுவாங்க. அந்த தான் போறோம்."

      கருவேலங்காடு மெல்ல மெல்ல விலகியது. தூரத்தில் ஒரு வீட்டின் சுவர் தெரிந்தது. அந்தப் போஸ்ட்பூத் அருகே சென்றபோது, சில பெண்கள் குடத்தில் தண்ணீர் சுமந்து போய்க்கொண்டிருந்தார்கள். அவர்கள் எங்களைக் கடந்து சென்றதும் வாசு என் காதில் சொன்னான்,
      "இப்போ போனவங்கள பாத்தியா, அதுல மயில்பச்சை கலர் சட்டை போட்டிருந்த பொண்ணு தான் கனகவள்ளி."
      நான் திரும்பிப் பார்த்தேன். முகம் தெரியவில்லை. அவள் கட்டியிருந்த சிவப்பு ரிப்பன் மட்டுமே தெரிந்தது. நாங்கள் அப்படியே விளையாட சென்றோம். வாசு எனக்கு சீட்டாட சொல்லித் தந்தான், கேரம் போர்டு ஆடி அந்த சிலரை நான் வென்றேன். எல்லாம் முடிந்து அப்படியே வீடு திரும்பினோம். அப்போது ஜெயா அந்தி வீட்டின் வாசல்கூட்டிக்  கொண்டிருந்தாள். எங்களைப் பார்த்தவுடன்,
      "ஏய் வள்ளி, அண்ணா வந்துருச்சு, வா!" 
      என்று கூப்பிட்டாள். நான் ஆர்வமாக வள்ளியின் வாசல் பார்த்துகொண்டு இருந்தேன். ஆனால் அவள் எங்கோ மறந்திருந்தாள் போல் திடீரென்று எங்களுக்குப் பின்னால் குதித்து "பா!" என்று கத்தி பயமுறுத்தினாள். நானும் வாசுவும் பயந்து படாரென்று கீழே விழுந்தோம். ஜெயாவும் வள்ளியும் வெடிக்கையாகச் சிரித்தார்கள்.
      வள்ளி சிரித்துக்கொண்டிருந்தபோது தான் அவளை முதல் முறையாகப் பார்த்தேன். அத்தனை அழகு. அவளின் கருநிற தேகத்தில் ஆயிரம் நிலவுகளை கண்ணில் பூசி, நட்சத்திரங்கள் பறக்களில் பதித்தவள் போல், அப்படி ஒரு அழகு அவளுக்கு. முத்துச் சிரிப்பில் தெரியும் தெத்து பல்லில் எத்தனை கவிதைகள் இருந்தன தெரியுமா? நல்லவேளையாக அவள் பயமுறுத்தியதால் நான் கீழே விழுந்தேன். இல்லையேல் அவளின் அழகில் மயங்கி நானே குறுகிவிழுந்திருப்பேன். ஜெயா என்னை எழுப்பி விட்டு, என் கையைப் பிடித்து என் தோளில் அவளது தலையை சாய்த்தபடி,
      "இது தான் அமுதன், என்னோட புது அண்ணன்" 
      என்று என்னை அறிமுகம் செய்து வைத்தாள். அந்த ஒரு நிமிடத்தில் வள்ளியை விட ஜெயா எனக்கு அழகாகத் தெரிந்தாள். யாரோ ஒரு கிழவி வயசு பொண்ணு இருக்க, வீட்டுலே தெரியாத பையன் எதுக்கு என்று கேட்க, அந்த வயசு பொண்ணே என் கைகளை இறுகப்பற்றி "இது என் அண்ணன்" என்று சொல்வது எப்படிப்பட்டது என்று தெரியுமா? தங்கை இல்லாத எனக்கு அந்த நொடி ஜெயா உடன் பிறந்தவளாகவே தெரிந்தாள். கண் கலங்கியது. கண்ணீரைப் பார்த்த வள்ளி,
      "ஐயோ மன்னிச்சுருங்க, விளையாட்டுக்குத் தான் பண்ணோம், நீங்க அழாதீங்க"
      என்றாள்.சட்டென்று வெட்கம் வந்தது.
      "ஐயோ இல்ல, கீழே விழுந்தப்போ தூசு பட்டிருச்சு"
      என்று சமாளித்தேன்.
      "அப்போ சரி, பரவால்ல. நான் வள்ளி" 
      அவள் கை கொடுத்தாள்,
      "இல்ல, கனகா" என்றான் வாசு.
      "ஏய், போ!" 
      அதட்டினாள் வள்ளி. அவளுக்கு கனகா என்று அழைத்தால் பிடிக்கவில்லை என்பது தெளிவாகத் தெரிந்தது. நானும் கை கொடுத்தேன்.
      "நான் அமுதன்."
      "நீங்க எத்தனாவது?"
      "நா பத்தாவது” 
      "நானும் பத்தாவது தான். அப்போ வா, போ, நாம் பேசலாம் போலயே."
      அதன் பிறகு வள்ளி பேசினாள், பேசினாள், பேசிக்கொண்டே இருந்தாள். நான் பார்த்துக்கொண்டே, இல்லை இல்லை, ரசித்துக்கொண்டே இருந்தேன். அந்த நொடி முதல் வள்ளி, வள்ளி, வள்ளி தான். அவளோடு விளையாடுவதுமாக, அவளோடு பேசுவதுமாக இருப்பேன். ஆனால் எப்போதும் ஜெயாவும் வாசுவும் உடன் இருப்பார்கள். வள்ளி தினமும் நீரூற்று வரை தன் தோழிகளுடன் போய் வருவாள், அன்று அந்த வழியில் அவள் வருவதற்காக நான் போஸ்ட்பூத்தில்  காத்திருந்தேன். அவள் வருவதைப் பார்த்ததும், வாசுவிடம் "இதோ வந்தரேன்" என்று சொல்லிவிட்டு அவளைப் பார்க்கப் போனேன். வள்ளி என்னைப் பார்த்ததும் தன் தோழிகளிடம் சொல்லிவிட்டு எதிர்பாராமல் என்னுடன் பேசத் தொடங்கினாள். நானும் அதற்கெல்லாம் பதில் சொல்லிக்கொண்டிருந்தேன். அதற்குள் வள்ளியின் தோழிகள் முன்னே போய்விட்டார்கள். நான் கொஞ்ச தூரம் துணைக்கு வருகிறேன் என்று வள்ளியிடம் சொன்னேன், அவளும் சரி என்றாள். அதுதான் நாங்கள் தனியாக இருந்த முதல் கணம். அந்தக் கருவேலங்காட்டினுள் ஒரு பெரு மழை பெய்து பட்டாம்பூச்சிகள் சிறகடித்துப் பறந்தது போல் ஆனந்தம் எனக்கு. அவள் தண்ணீர் குடம் சுமந்து ஆண்டாள் போல் நடந்து வந்தாள்.
      "வள்ளி, நீ யாரையாவது காதலிக்கிறாயா?" என்று கேட்டேன்.
      "அப்படி எல்லாம் இல்ல, ஏன் திடீரென்று இதைக் கேக்கிற?" என்றாள்.
      நான் எதுவும் சொல்லாமல் வெட்கத்துடன் சிரித்தேன். அவளும் எதுவும் பேசவில்லை, மௌனம் கொண்டாள். இருவரும் மௌனமாக நடந்துகொண்டிருந்தோம். அப்போது காற்றில் அவளது கூந்தல் என் மீது மோதியது. அந்த ஒரு தொடுகையில் மனம் அது வரை கண்டறியாத ஒரு உணர்வு என்னை ஆட்கொண்டது. நாட்கள் ஆக ஆக அவளின் அந்த அழகு கூடிக்கொண்டே போனது. கனகாம்பர மலரின் மொத்த அழகையும் பெற்றவளாக இருந்தாள் அவள். அவளுடன் தனியே நடந்த அந்த நொடியில் என் இதயம் ஆயிரம் மடங்கு வேகமாகத் துடித்திருக்கும். ஆனால் அந்தத் தனிமை நீடிப்பதற்குள் அவளின் தோழிகள் வழியில் காத்திருந்து அவளைக் கூட்டிப்போனார்கள். நான் திரும்பி போஸ்ட்பூத்திற்கு வந்தேன். என் வாழ்வின் முதல் காதல் என்று நான் இதை கருதுகிறேன். வாசுவிடம் எப்படிச் சொல்வது என்று தெரியவில்லை. நான் திரும்பி வந்தவுடன் அவனே கேட்டான்,
      "எங்கடா போன?"
      "இல்லடா, அங்கே வள்ளி..."
      "வள்ளி, அவளுக்கு என்ன?"
      "இல்ல, சும்மா அவளைப் பாக்கத்தான் போனேன்."
      "வள்ளியைப் பாக்க என்ன? காலைலே தானே பாத்தோம்."
      "இல்ல, தனியாப் பாக்கணும் போல இருந்துச்சு, எனக்குத் தெரியல, அவளை ரொம்ப பிடிச்சிருக்கு."
      வாசு எதுவும் பதில் சொல்லாமல் என்னைப் பார்த்துச் சிரித்தான். அவன் சிரிப்பே அவனின் பதிலாக இருந்தது. ஆனால் எனக்கோ முகம் நன்றாகச் சிவந்து வெட்கமாக இருந்தது. சிரித்துக்கொண்டே அவன் முன் நின்றேன். வள்ளி என்றால் எனக்கு அத்தனை பிரியம் என்று எனக்கு அப்போது தான் தெரிந்தது. 
      வள்ளியின் வீட்டுச் சுவரும் வாசுவின் வீட்டுச் சுவரும் நடுவே இரண்டடி இடைவெளி. அந்த இடைவெளியில் நாங்கள் ஒரு சிறிய கூடாரம் அமைத்தோம். இரு சுவர்களிலும் நாலடி உயரத்தில் தலா ஒரு கம்பை மட்டமாகச் சொருகினோம். அந்த இரண்டு கம்புகளிலும் குறுக்கே ஒரு பழைய வெள்ளைச் சேலையை விரித்துப் போர்த்தினோம், கூரையானது. நடுவே தொய்ந்துவிடாமல் இருக்க இடையிடையே சிறு குச்சிகளை இரு பக்கமும் தள்ளி நிறுத்தினோம், அவை கூரையை சிறு கொட்டகை போல் இழுத்துப் பிடித்து நின்றன. பின்புறம் அந்தத் துணியை நன்கு இழுத்து திரை போல் மூடிவிட்டோம். முன்புறம் மட்டும் திறந்திருந்தது. அதை மூட ஒரு பழைய கம்பளத் துணியை மேல் கம்பில் மடித்துத் தொங்கவிட்டோம். தரையில் பழைய அரிசி மூட்டைகளை நான்கு மடிப்பாக விரித்து வைத்தோம். நான், வாசு, வள்ளி, ஜெயா நால்வரும் கூட்டாஞ்சோறு சமைத்து அந்தக் கூடாரத்தில் அமர்ந்து உண்டு மகிழ்ந்து விளையாடினோம். ஒரு நாள் நானும் வாசுவும் அவனது வீட்டில் பலாபழம் உரித்துக்கொண்டிருந்தபோது திடீரென்று விருந்தாளிகள் வந்தார்கள். அம்மா, வாசு, தாத்தா, பாட்டி எல்லோரும் அவர்களை வரவேற்று உபசரித்தார்கள். எல்லோரும் ஜெயா எங்கே என்று கேட்டார்கள். "தோ, இங்கே தான் இருப்பா, நான் கூப்பிடுறேன்" என்று சொல்லிவிட்டு எங்கள் கூடாரத்தில் தேடப் போனேன். அங்கே வள்ளியும் ஜெயாவும் பல்லாங்குழி விளையாடிக்கொண்டிருந்தார்கள்.
      "உங்க சொந்தக்காரங்க யாரோ வந்திருக்காங்க, உன்னை கூப்பிடுறாங்க, வீட்டுக்கு போ" என்று ஜெயாவை அனுப்பிவிட்டேன்.
      அவள் கிளம்பினாள். அவளுக்கு மாறாக வள்ளி என்னைப் பல்லாங்குழி ஆட அழைத்தாள்.
      "அமுதா, உனக்கு ஆட தெரியுமா?"
      "எதோ தெரியும்."
      "அப்போ வா, ஆரம்பிக்கலாம்."
      விடுமுறை முடிய போகிறது. இங்கிருந்து கிளம்பி ஆக வேண்டும். அதற்குள் எப்படியாவது காதலை வள்ளியிடம் சொல்ல வேண்டும் என்று மனம் படபட என்று அடிக்கத் தொடங்கியது. தனியாக இருக்கிறோம். கூடாரமும் மூடி இருக்கிறது. இது தான் சரியான நேரமாக இருக்க வேண்டும். எப்படித் தொடங்குவது என்று தெரியவில்லை. நல்ல வேளை வள்ளியே எதோ சொல்ல வருகிறாள்.
      "பரவாலா அமுதா, நீயும் வாசுவும் நல்லா கட்டிருக்கீங்க, கூடாரம் நல்லா இருக்கு."
      "அப்படியா? வள்ளி. உனக்கு பிடிச்சிருக்கா?"
      "ம்ம்… பிடிச்சிருக்கு."
      "கூடாரத்தை பிடிச்சிருக்கா?"
      "அதை தான் சொன்னேன்."
      "ஓஹோ, சரி சரி. அப்றம் வள்ளி,  உன்கிட்ட ஒன்னு கேக்கணும்."
      "சரி, கேளு…"
      எப்படிக் கேட்பது என்று தெரியவில்லை. அவசரப்பட்டு வாய் திறந்துவிட்டேன். சரி, சமாளிப்போம்.
      "வள்ளி, உனக்கு எந்த மாதிரி வீடு கட்டணும்னு ஆசை? எங்கே கட்டணும்னு ஆசை?"
      "எனக்கா? அது வந்து, முதல்ல நீ சொல்லு, அப்றம் நான் சொல்றேன்."
      இதோ என்னைக் கேட்கிறாள். வசீகரமாக, கவிதுவமாக பதில் சொல்லி அவளை ரசிக்க வைத்துவிடலாம்.
      "எனக்கா வள்ளி ஒரு பெரிய கடற்கரை கிட்ட, தினமும் அந்த அலைகளை ரசிக்கிற மாதிரி, இல்லன்னா, ஒரு மலைப்பிரதேசத்துலே திறந்தவெளியிலே தனியா ரொம்ப அமைதியா ஒரு வீடு, இல்லன்னா, ஒரு அருவிக்கு பக்கத்துலே, அந்த சாரல் அடிக்கிற தூரத்துலே கதவை இருக்கற வீடு, இல்லன்னா, பனி விழுகர ஊர்ல எப்பவுமே வெரக கொளுத்தி குளிர் காயற மாதிரி வீடு.. நம்ம குழந்தைங்க விளையாட பெரிய இடம் இருக்கிற மாதிரி ஒரு வீடு, இல்லன்னா, பிடிச்ச பொண்ணு கூட இந்த மாதிரி ஒரு சின்ன கூடாரம்."
      இது அவளுக்குப் புரிந்ததா, புரியவில்லையா என்று எனக்குத் தெரியவில்லை. சொல்லி முடித்ததும் எனக்கும் உடலெல்லாம் வேர்த்துவிட்டது. அவள் என்ன பதில் சொல்லப் போகிறாளோ என்று அவளை பார்த்தேன். அந்தக் கண்கள் என்னை உற்றுநோக்கியபடி இருந்தன.
      "நல்லா இருக்கு அமுதா. இப்போ நான் சொல்லவா?"
      என்றாள். எனக்குப் புரியவில்லை. நான் மறைமுகமாக சொன்னது அவளுக்குப் புரியவில்லையா? அல்லது தெரிந்தும் தெரியாமல் இருக்கிறாளா? குழப்பமாக இருக்கிறதே.
      "சரி, சொல்லு" என்றேன்.
      "இங்கிருந்து அப்படியே ரெண்டு மைல் நடந்து போனா ஒரு கருவேலங்காடு வரும்."
      "ஆமா, வரும்."
      "நீ கூட சீட்டு விளையாட போவியே. அத தாண்டினா ஒரு கள்ளிக்காடு இருக்கும். அதை தாண்டினா ஒரு ஒற்றையடி ரயில் பாதை வரும். ரயில் போனா எப்போ பாரு இரைச்சல் சத்தமாவே இருக்கும். எனக்கு அங்கேதான் ஒரு வீடு கட்டிப் போணும்."
      "அங்கையா? அந்தப் பொட்டல் காட்டுலையா? அங்கே என்ன இருக்கு?"
      "இல்ல அமுதா, அது வந்து—"
      ஏதோ சொல்ல தடுமாறினாள். நான் குறுக்கிடாமல் காத்திருந்தேன்.
      "அங்கேதான் நல்லா தண்ணி ஊத்து இருக்கு. அங்கேதான் தினமும் நல்லா தண்ணி எடுக்கப் போவேன். அஞ்சு மைலுக்கு மேலே நடக்கணும். கால் வலிக்கும். அதுவே அங்கே வீடு கட்டிட்டா நடக்க வேணாம்லே.
      அமுதா, வீட்டுலேயிருந்து கூப்பிடற மாதிரி சத்தம் கேக்குது, நான் வரேன்."
      என்று சொல்லி கிளம்பினாள். அவள் சொன்ன பதிலைக் கேட்டு நான் உறைந்தே போனேன்.
      ஒரு பெரும் கத்தி நெஞ்சை கிழித்து அறுத்தது போல் குற்றம் கொண்டேன். சுமார் பத்து நாட்களாக இங்கேதான் இருக்கிறேன். அவளின் அழகை உணர்ந்த எனக்கு அவளின் வாழ்வியலை உணர முடியவில்லை. போஸ்ட்பூத்திலிருந்து அவள் சென்று வருவதை பார்த்து ரசித்திருக்கிறேன் ஆனால் ஒரு நாளும் அவள் இவ்வளவு தூரம் தாண்டி தண்ணீர் எடுக்க நடந்து, குடத்தை தூக்கிக்கொண்டு மீண்டும் நடக்கிறாள் என்று அவளின் வலியை நான் சிந்தித்துப் பார்க்கவே இல்லை. வாசு என்னை முதல் நாள் அன்று அழைத்து சென்றதற்கே எனக்கு அவ்வளவு இளைப்பாக இருந்தது.  ஆனால் வள்ளி பாவம், தினமும் அவ்வளவு தூரம் நடக்கிறாள். நான் அதை அழகியாலாக பார்த்தது எவ்வளவு பெரிய அறியாமை. வள்ளியின் வாழ்வியலோடு சேர்ந்து பல புரிதல்களும் எனக்கு அன்று ஏற்பட்டன. நான் வள்ளியிடம் கொண்ட காதலை அவளிடம் விவரித்திருந்தால் அவள் என்னை வெறுத்திருக்கவே கூடும். நான் சொல்லாதது நல்லதே போலும். காதலை சொன்னால் அவள் அதிகபட்சம் 'இல்லை' என்றுதான் சொல்வாள் என்று நான் நினைத்தேன். ஆனால் அவள் சொன்னதோ, அந்த 'இல்லை'யை விடவும் மிக வேதனையானதாக இருந்தது. உறவினர்கள் கிளம்பியவுடன் வாசுவிடம் இதை சொன்னேன் என்னால் அழாமல் இருக்க முடியவில்லை. அவன் "சரி வா, கொஞ்சம் நடக்கலாம்" என்று என்னை காளிக்காட்டின் வழியே கூட்டிச் சென்றான். கதறி அழுதேன். வள்ளியை நினைத்து வலியும், என்னை நினைத்து வெறுப்பும் என்னை கொன்றது. அன்று பொழுது சாய்ந்தும் நாங்கள் வீடு திரும்பவே இல்லை. வாசுவின் அம்மாவே எங்களைத் தேடி வந்து, "இவ்வளவு நேரம் ஏன் வீடு திரும்பவில்லை?" என்று கேட்டுத் திட்டித் தீர்த்து வீட்டிற்கு அழைத்துச் சென்றாள். திரும்பிச் செல்லும் வழியில் வள்ளியின் கால் சுவடுகளைத் தேடிக்கொண்டே போனேன். இந்தக் கிட்டாங்குடியில் முளைத்த அந்தக் கனகாம்பரம், இன்னும் எத்தனை நாட்களுக்கு நீர் பற்றாக்குறையால் வாடிக்கொண்டிருக்குமோ என்னவோ.



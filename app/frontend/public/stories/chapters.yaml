    content: |
      யாரோ சொல்லி கேட்டதுண்டு, வறுமையின் நிறம் சிவப்பு. சிவப்பில் என்ன? அது ஏன் நீலம், பச்சை, மஞ்சள் அல்லது கருப்பாகக் கூட இருக்கலாமே, சிவப்பில் என்ன? வறுமை என்றால் வறுமைதானே, அதில் சிவப்பென்ன கருப்பென்ன? சிவப்பின் காரணம் உணரும் வரை குழப்பமாகத்தான் இருக்கும். வறுமை எங்கே துவங்கும்? எங்கே வேண்டுமானாலும் துவங்கலாம். சிலரின் வறுமை மூன்று தலைமுறைக்கு முன்னமே துவங்கியது, சில வறுமைகள் நேற்றின் பொழுதில் பாகப்பிரிவினைகளில் துவங்கும், சில பாகப்பிரிவினைகள் கற்காலத்திலும், மன்னர்காலத்திலும், ஆங்கிலேயர் காலத்திலும் மாறி மாறி மருவியது. இந்த அமுதன் வறுமையின் நிறம் கண்ட கதை, இக்கதை சொல்லும். அதன் ஆணிவேர் எங்கு வேண்டுமானாலும் துவங்கி இருக்கலாம், யாரோ துவங்கி வைத்த ஒரு அலை, என் வயிற்றில் அடித்த கதை.

      நான் இளநிலை படிப்பை முடித்து, ஒரு சிறிய ஐ.டி நிறுவனத்தில் பயிற்சியாளராகச் சேர்ந்தேன். பொதுவாக ஐ.டி அலுவலகங்கள் ஊரின் மத்திய பகுதிகளில் அமைவது இயல்பு, ஆனால் சில சிறிய நிறுவனங்கள் கட்டிட வாடகையைச் சேமிக்கும் பொருட்டு நகரின் வெளிப் புறத்தில் செயல்பட்டு வருவதும் உண்டு. நான் பணிபுரிந்த அலுவலகம் அவ்வாறே அமைந்திருந்தது. அதனாலே பெரியதாக விடுதிகள் ஏதும் இல்லை, வாடகை வீடுகளும் குடும்பத்தினருக்கு அன்றி வேறு வெளியாட்களுக்குத் தருவதில்லை. எனக்குக் கிடைத்ததும் நான் தங்கியிருந்த வீடும் அலுவலகத்தில் இருந்து 3 மைல் தொலைவில் அமைந்திருந்தது. என்னுடன் வேலை செய்யும் சக ஊழியர்களுடன் சேர்ந்து நாங்கள் ஐவர் ஒரே வீட்டில் தங்கி, அலுவலகத்திற்குப் போய் வந்தோம்.. இரண்டு இருசக்கர வாகனங்கள் இருந்தமையால் போக்குவரத்து பெரியதாகக் கடினமாக இருக்கவில்லை ஆனால் அவ்வப்போது இருந்தது, யாரேனும் ஒருவர் என்னை அழைத்துச் செல்ல காத்திருக்கையில் அவர்களின் முகத்தில் அந்த சகிப்புத்தன்மையை என்னால் பார்க்க முடிந்தது. பயிற்சியின் உதவித்தொகையாக மாதம் எட்டாயிரம் வழங்கப்பட்டது, வாடகை, உணவு மற்றும் இதர செலவுகள் என்றும் பையில் மிச்சம் பிடிக்க ஏதும் இருந்ததில்லை. நேரம் என்பது மிகவும் கொடுமையானது, சிறு வயதில் லிஃப்ட் கேட்கக் கையேந்த மறுத்த சிறுவர்களை, பெரிதானபின் இருசக்கரத்தின் சாவிக் கேட்டுக் கையேந்த வைக்கிறது. அவ்வாறு ஒவ்வொரு முறையும் ஏதேனும் ஒரு அவசரத்துக்காக நான் பிறரிடம், வண்டி சாவி கேட்டுக் வாங்கும் பொழுதில் அந்தச் சிறு சாவி எத்தனை கனமாக இருந்ததென்று என்னைப் போன்றவர்களால் மட்டுமே உணர முடியும். பள்ளிக்கூடங்கள் எல்லாம் கோடிகளில், லட்சங்களில், ஆயிரங்களில், நூறுகளில் என்று ஊதியத்திற்கு ஏற்பப் பிரிந்து இருந்தமையால் என்னுடன் படித்தவர்கள் அனைவரும் பெரும்பாலும் என்னைப் போன்ற நடுத்தர குடும்பத்தில் இருந்தே வந்தார்கள், ஆகையால் பெரிய வேறுபாடுகள் கண்டு நான் வளரவில்லை, கல்லூரியிலும் கிட்டதட்ட அதே கதைதான். வீட்டிலும் எதுவும் கேட்டதில்லை, நான் கேட்கும் சிறு சிறு பொருட்களையும் வாங்கிக் கொடுத்து பெரிய ஏக்கங்கள் இன்றி என்னை வளர்த்து விட்டார்கள். அப்படிப்பட்ட நான் இந்த அலுவலகத்தில் வெவ்வேறு பின்புலத்தில் இருந்து வந்த மனிதர்களைச் சந்தித்தபோது அவர்களின் வாழ்வியலுடன் நான் கொண்டிருந்த தூரம் மிகவும் தொலைவாக இருந்தது, அதை பணத்தால் மட்டுமே நிரப்ப முடியும் போலும்.
      காதல் வந்து மனதில் அலை அடிப்பதை உணர்ந்ததுண்டு, ஆனால் வயிற்றில் அலை அடிக்கும் உணர்வுகளை அங்கேதான் உணரத் துவங்கினேன். அப்படி அலை அடித்த வயிற்றில் ஒரு சுனாமி அடித்த நாள் வந்தது. நான் தங்கியிருந்த வீட்டில் எங்களின் வேலை நேரம் அவ்வப்போது மாறிவரும், நடுநிசி, விடியற்காலை என்று போய் வருவோம், ஆகையாலே கதவை தாழ்ப்பாளைப் பூட்ட மாட்டோம். ஒரு நாள் நான் தூக்கத்தில் இருந்து எழுந்து குளிக்கச் சென்றுவிட்டேன், வெளியே வருகையில் சேகர் எதையோ பரபரப்பாகத் தேடிக்கொண்டு இருந்தான். என்னவென்று கேட்கையில் அலுவலகத்தின் மடிக்கணினியைக் காணவில்லை என்றான், உடனே நான் சென்று என் கணினியைப் பையில் பார்த்தேன், நல்ல வேளை இருந்தது, பிறகு ஆண்டனியை எழுப்பிவிட்டுச் செய்தி சொன்னோம், அவன் சென்று பார்க்கையில் அவனது அலுவலகக் கணினி இருந்தது, ஆனால் சொந்த மடிக்கணினியைக் காணவில்லை. இருவரும் செய்வதறியாது மூச்சடைத்து நின்றார்கள். நாங்கள் உடனே வேகமாக மேலே தங்கியிருந்த வீட்டு உரிமையாளரிடம் சென்று செய்தியைச் சொல்லி, வாசலில் இருந்த கண்காணிப்பு கேமரா கோப்புகளைப் பார்த்தோம், விடியற்காலையில் ஜேம்ஸும் மதனும் வெளியே போயிருக்கிறார்கள். அவர்கள் போவதைப் எதிர் வீட்டுத் திண்ணையில் ஒருவன் கம்பளியைப் போர்த்தி தூங்கிய வண்ணம் பார்த்துக்கொண்டிருக்கிறான், அவர்கள் இருவரும் வீதி முனையில் திரும்பக் காத்திருந்தான் போலும், சிறிது நேரம் கழித்துக் கம்பளியைப் போர்த்தியபடி எங்கள் வீட்டில் நுழைகிறான். சில மணித்துளிகளில் வெளியே போகிறான், இதோ… அவன் மடிக்கணினிகளை மறைத்து வைத்துப் போவது இதில் நன்றாகத் தெரிகிறது. கோப்புகளை ஒரு காப்பி எடுத்துச் செய்தியை அலுவலகத்தில் தெரியப்படுத்தினோம், அவர்கள் காவல்துறையிடம் சொன்னார்கள். பெரும் தவறாகிவிட்டது, கதவை தாழ்ப்பாளிடாமல் இருந்த பழக்கம் இப்படி எங்களைப் பாதிக்கும் என்று எங்களுக்குத் தெரியவில்லை. என்னதான் என் உடைமைகள் தொலைந்து போகவில்லை என்றாலும், அவர்களை நினைத்து மிகவும் வருந்தினேன், அதுமட்டுமல்லாது என்று வேண்டுமானாலும் இது எனக்கும் நடக்கலாம். அலுவலகத்திலும் காவல் நிலையத்திலும் பெரும் சிக்கலாகிவிட்டது. எங்கள் கவனக்குறைவால் சூழ்நிலைக் கைதிகள் ஆனோம். எதுவும் செய்ய முடியவில்லை. சேகரின் மடிக்கணினிக்கு அலுவலகத்தின் காப்பீடு இருந்தது, ஆனாலும் கூட அதில் முழுத் தொகை ஈடுசெய்யப்படாது, பாதி இவன் செலுத்த வேண்டியதாக இருந்தது, தொலைந்த கணினியோ ஆப்பிள் நிறுவனத்தின் உயர் ரக கணினி, விலை சுமார் 1.5 - 2 லட்சம் வரும், அதில் பாதி என்று இவனை 80,000 கட்ட சொன்னார்கள், இல்லையெல் அது சம்பளத்தில் இருந்து மாதம் மாதம் பிடித்துக் கொள்ளப்படும் என்றும், அதுவரை அவனால் அலுவலகத்தில் இருந்து விலக முடியாதவாறு இது எத்தனையோ விதிமுறைகளைச் சொல்லி ஒரு ஒப்பந்தத்தை எழுதி அவனிடம் கையொப்பம் பெற்றனர். பாவம் ஆண்டனி அவனது தனிப்பட்ட கணினி என்பதால், காப்பீடு ஏதும் இல்லை.

      இந்த சம்பவங்கள் எல்லாம் நடந்தமையால் நாங்கள் பெரும் மாற்றத்திற்கு உள்ளானோம். என் பொருட்கள் எதுவும் தொலைந்து போகவில்லை அல்லவா, அது வேறு அவர்களுக்கு ஏதோ உறுத்தலாக இருந்தது போல, என்னால் அந்த கசப்பை உணர முடிந்தது. அலுவலகம் சென்று வரும் நேரம் மாறியது. யாருக்காகவும் யாரும் காத்திருக்கவும் இல்லை. வேலை முடிந்தவுடன் கிளம்பிவிட பழகினார்கள், என்னிடம் வேறு வண்டி இல்லை அல்லவா, ஆகையால் நான் நடந்து செல்லும் நாட்கள் துவங்கியது. பகலில் வெயிலும் இரவில் குளிரும் அவ்வப்போது வறுமை நிலையும் என்னை வாட்டியது. முழு நேரப் பணியாளர் ஆன பின் மாதத் தவணையில் ஒரு வண்டியோ அல்லது வாடகை கூட இருந்தாலும் பரவாயில்லை என்று அலுவலகத்தின் பக்கம் வீடு மாற வேண்டும் என்று உறுதி செய்தேன்.

      என்றைக்கும் போல்தான் அன்றும் வயிற்றில் பயத்துடன் இரவு ஒரு 1 மணி அளவில் அலுவலகத்தில் இருந்து வீட்டிற்கு நடந்து போய்க்கொண்டு இருந்தேன். சாலை வெறிச்சோடிதான் காணப்படும், பெரிதாக வீடுகளோ, கடைகளோ, வாகனப் போக்குவரத்தோ இருக்காது. ஒவ்வொரு வாகனத்தின் சத்தம் கேட்கும் போதெல்லாம் 'திக் திக்' என்று இதயம் வேகமெடுத்து அடிக்கும். தூரத்தில் இருந்து வரும் வண்டியின் சத்தம் கேட்கும் நொடி முதல், அவ்வண்டி சென்று மறைந்து அந்த சத்தம் மறையும் வரை உயிரை கையில் பிடித்து வெளியே விடுவேன். ஒவ்வொரு வாகனமும் ECG மீட்டரில் இருக்கும் ஒவ்வொரு மேடுபள்ளமாக இருந்தது.
      அப்படித்தான் அன்று ஒரு வண்டி எங்கோ தூரத்தில் இருந்து வந்தது. வழக்கம் போல் இதயம் வேகமெடுத்தது, உயிரைப் பிடித்து நின்றேன், என்னைக் கடக்கும் வரை மூச்சைப் பிடித்தவாரே நடந்து கொண்டு இருந்தேன். என்னைக் கடக்கும் அந்த ஒரு நொடிப் பொழுதில் அந்த இரு சக்கரம் என் அருகே நிற்பதைக் கவனித்தேன். சட்டென நான் திரும்பிப் பார்க்கையில் ஒருவன் வண்டியில் இருந்து குதித்து என் பின்னே நின்றான், வண்டியோ என் முன்னே வழி மறித்து நின்றது, அதில் இரண்டு பேர் இருக்க, ஒருவன் என் முன் நின்று கொண்டான், மொத்தம் மூவர், ஒருவன் என் முன், ஒருவன் என் பின், மற்றொருவன் தயார் நிலையில் வண்டியுடன் இருந்தான். என்னால் ஓட முடியாதவாறு மறித்துக் கொண்டனர். சட்டென்று இருவரில் ஒருவன் கையில் கத்தி எடுத்தான், நடுங்கினேன். பையில் இருப்பதை எடுக்கச் சொன்னார்கள். என் பையிலோ மடிக்கணினி, அதன் சார்ஜர், பிறகு பர்ஸில் ஒரு 500 ரூபாய் இருந்தது. சட்டென சுதாரித்து முதுகில் மாட்டியிருந்த பையை முன்புறம் திருப்பி மாட்டி வயிறோடு அணைத்துக் கொண்டேன். பையைக் கொடுக்குமாறு என்னை மிரட்டினார்கள். எனக்கு ஒன்றுதான் தோன்றியது. பையைக் கொடுத்தால் நானும் 80,000-மோ அல்லது 1,00,000-மோ கொடுக்க வேண்டியது இருக்கும். அவ்வளவு பணம் என்னிடம் இல்லை, குடும்பத்திலும் அவ்வளவு கேட்டாலும் கிடைப்பது சத்தியம் இல்லை, மிக மிகக் கடினம், வீட்டார் எங்கேயாவது கடன் வாங்கித்தான் கொடுக்க வேண்டியது இருக்கும், ஊதியத்தில் கழிக்கும் அளவுக்கு நான் சம்பாதிக்கவும் இல்லை, ஆகையால் என்ன ஆனாலும் கணினியைக் கொடுக்கக் கூடாது என்று முடிவெடுத்தேன். என்னிடம் இருந்த கைபேசியைக் கொடுத்து என்னை விட்டுவிடச் சொல்லி கேட்டேன், கைபேசியின் விலை சுமார் 15,000 இருக்கும், அதைப் பெற்றுக் கொண்ட அவர்கள் மீண்டும் என் பையைக் கேட்டார்கள். நான் தருவதாக இல்லை, என் வேலை போய்விடும் என்று கெஞ்சினேன், மன்றாடினேன். ஆனால் அவர்கள் கேட்பதாய் இல்லை, பின்னால் நின்று கொண்டு இருந்தவன் முதுகில் ஓங்கி மிதித்தான், மண்ணில் குப்புற விழுந்தேன். எனக்கு நிச்சயமாகத் தெரியும் நான் விழுந்த வேகத்தில் கணினி கண்டிப்பாக உடைந்திருக்கும் அல்லது ஏதேனும் சேதமாகியிருக்கும். வெடுக்கென்று கோபம் கொண்டேன். விழுந்த இடத்தில் இருந்து உடனே இரு கைகளிலும் மண்ணை அள்ளி மேல் நோக்கி அவர்களின் முகத்தில் தூவினேன். அவர்கள் நிலை குலைந்த அந்த ஒரு நொடியில் நான் எழுந்து ஓடத் துவங்கினேன். வண்டியில் இருந்த ஒருவன் என்னைத் துரத்தி வந்து வண்டியில் முந்தியவாரே என்னை எட்டி மிதித்தான். மீண்டும் கீழே விழுந்தேன், இம்முறை நான் சுதாரிப்பதற்குக்ள் அவன் வண்டிப் பையில் வைத்திருந்த ஒரு கட்டையை எடுத்து என்னை அடிக்கத் துவங்கினான். முதுகு, கால் மூட்டு, கழுத்து என்று அடி சரமாரியாக விழுந்தது. நான் பையைக் கட்டிப்பிடித்தவாறே இறுக்கமாகப் படுத்துக் கொண்டேன். மீதம் இருந்த இருவரும் வந்து கால்களால் மிதிக்கத் துவங்கினார்கள். வலி தாங்க முடியவில்லை, பையை இழுத்தவாறு அடித்துக் கொண்டே இருந்தார்கள், வலி தாங்காமல் கண்ணீர் கண்ணைத் தாண்டி வழிகிறது, திடீர் என்று வாயில் இருந்து இரத்தம் பீறிட்டு வந்தது. என் அம்மா என்னைப் பெற்ற போது இவ்வளவு வலி கண்டிருப்பாளா என்று தெரியவில்லை, உடம்பெல்லாம் அவ்வளவு வலி. கொஞ்சம் கொஞ்சமாகக் கண் இருட்டியது, பிறப்புறுப்பில் ஒரு அடி விழுந்தது, உயிர் போவதை உணர்ந்தேன், கண் மூடினேன்.

      வெகு நேரம் கழித்துக் கண்ணைக் கொஞ்சம் கொஞ்சமாகத் திறந்தேன், மங்கலாகத் தெரிந்தது. சாலையின் ஓரத்தில் கிடந்தேன். ஒரு சில வண்டிகள் கடந்து போவதைக் கண்டேன், வாய் கூடத் திறக்க முடியாத தெம்பு இல்லை, தொண்டை வரண்டிருந்தது. மெல்லமாகக் கைகளால் வயிற்றில் தடவிப் பார்த்தேன், பையைக் காணவில்லை, அஞ்சினேன், மனமிழந்தேன், இனி அந்த 1 லட்சத்தை எப்படி ஏற்பாடு செய்வேன். கொஞ்சம் கொஞ்சமாகக் கையைத் தூக்கி உதவி கேட்க முனகுகிறேன், ஆனால் ஒரு வண்டியும் நிறுத்தவில்லை. கண்டிப்பாக நிறுத்த மாட்டார்கள், நானாக இருந்தால் கூட ஏதோ ஒரு குடிகாரன் முனகுகிறான் என்று கண்டுக்காமல் தான் போய் இருப்பேன். நாம் என்ன நினைக்கிறோமோ அதுவே நமக்கும் நடக்கும் அல்லவா, வலியால் கத்தக் கூட முடியவில்லை, அழுது கொண்டே முனகுகிறேன், கண்ணீர் காயங்கள் மீது வழிந்து கொண்டு இருக்கிறது, கண்ணீர் படக் காயங்கள் இன்னும் எரிச்சல் எடுக்கிறது. ஏதேதோ சிந்தனைகள் தலையில் ஓடிக் கொண்டு இருந்தது, இன்னும் கொஞ்சம் பணம் இருந்திருந்தால் வண்டி வாங்கி அதில் போயிருக்கலாம், இன்னும் கொஞ்சம் பணம் இருந்திருந்தால் அதிக வாடகையில் அலுவலகத்தின் அருகே குடியேறி இருக்கலாம், இன்னும் கொஞ்சம் பணம் இருந்திருந்தால் அவர்கள் கேட்டபோதே கணினியைக் கொடுத்து காப்பீட்டின் மீதித் தொகையை அடைத்திருக்கலாம், இன்னும் கொஞ்சம் பணம் இருந்திருந்தால் இந்தக் குறைந்த சம்பளத்திற்கும் பயிற்சியாளராக வராமல் மேலே படிக்கப் போயிருக்கலாம், இன்னும் கொஞ்சம் பணம் இருந்தால் சொந்த வேலை செய்திருக்கலாம், இன்னும் கொஞ்சம் பணம் இருந்திருந்தால் வேலைக்கு போகாமல் வீட்டிலேயே இருந்திருக்கலாம், இன்னும் கொஞ்சம் பணம் இருந்திருந்தால்… என்ன யோசித்து என்ன, காயம் ஒரு புறம் வலிக்கிறது, என்னைச் சூழ்ந்திருக்கும் 1 லட்சத்தின் கடன் ஒரு புறம் வாட்டுகிறது.
      சாலையில் படுத்திருந்த நான் மெல்ல திரும்பி எழுந்து நிற்க முயன்றேன், முடியவில்லை. சுற்றிலும் ஒரே துர்நாற்றம், உடல் எல்லாம் இரத்தம், முகமெல்லாம் கண்ணீர். மெல்ல மண்டியிட்டுப் படுத்திருந்த இடத்தைப் பார்த்தேன், அது ஒரு குப்பைக் குவியல், நான் படுத்திருந்த இடத்தில் மொத்தமும் இரத்தம், சிவப்பு இரத்தம், ஆம் சிவப்பு. புரிந்தது வறுமையின் நிறம் சிவப்பு.



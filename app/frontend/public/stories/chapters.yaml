      - vasu
      - jeya
    content: |
      என் இருபதுகளின் தொடக்கத்தில் நடந்த நிகழ்விது. என் நண்பர்களுடன் வெளியூரில் தங்கி வேலை பார்த்து வந்தேன். அன்று நானும் என் தோழர்களும் சனிக்கிழமை இரவுக்காட்சி திகில் படம் பார்த்து முடித்துவிட்டு திரையரங்கில் இருந்து வீட்டிற்கு நடந்து சென்று கொண்டு இருந்தோம். சிலர் புகை இழுத்து வட்டம் இடவும், வாங்கிய பீர் பாட்டில்களை கைக்குழந்தை போல பத்திரமாகவும் கையில் சுமந்தும் நடக்க, நானும் பாலாணும் சிவபாணம் வைத்திருந்த செல்வத்தை நடுவே நடக்கவைத்து பேய்களைப் பற்றி பேசியபடி வீடு சென்று அடைந்தோம். பானங்கள் குளிரூட்டும் பெட்டியை அடைந்து புத்துயிர் பெறத் துவங்கின. சுருட்டு, சுருள் சுருளாக வளையத்தில் தேய்ந்து கொண்டு இருந்தது. 0 டிகிரி அடைந்த பின், எங்கள் 98 டிகிரி உடலில் வழிந்து இறங்கியது, பானம். செல்வம், தான் வைத்திருந்த சிவபானத்தை நன்கு காய்ச்சிய பாலில் கலந்து, அதனுடன் பால்கோவாவையும் சேர்த்து, ஒரு பெரும் கோப்பையில் ஊற்றி, ஒரு வேப்பங்குச்சியை நன்கு இடித்துப் பட்டையாக்கி, பாலைக் கலக்கி, ஒரே வாயில் மொத்தத்தையும் குடித்து முடித்தான். செல்வத்துள் எல்லாம் தலை செல்வம் ஆனான். நாங்கள் வழியில் பேசி வந்த பேய்க் கதைகள் ஒவ்வொன்றும் ஒவ்வொரு வடிவம் கொண்டதாக இருந்தது, ஆகையால் சுவாரஸ்யம் குறையாது மயக்க நிலையில் மீண்டும் கதைகள் துவங்கியது.

      அகிலன் தனது தாத்தா சொன்னதாக இதை சொன்னான் 
      “எங்க தாத்தா சின்னப் பயலா இருக்குறப்ப, சாயங்காலத்துல கறந்த பால ஊரெல்லாம் ஊத்திட்டு, ராத்திரி மாதிரி திரும்ப வீட்டுக்கு வருவாரு”
      “அப்படி ஒருநாள் திரும்பி வரும்போது, ரோட்டுக்கரையில சைக்கிளை ஓரமா நிப்பாட்டி, அங்க இருந்த மைல் கல்லு மேல உட்காந்து, மடியில கயிலியோட கட்டி வச்சிருந்த வெத்தலைய எடுத்து, சுண்ணாம்பு தடவி போட்டு, அப்படியே ஒரு பீடிய பத்தவச்சாராம்…”
      “அப்ப திடீர்னு…
      ‘எனக்கும் ஒரு வெத்தல குடு’ன்னு சொல்லிட்டு, ஒரு கை எங்க தாத்தா முதுகுல தடவுச்சாம்.”
      “கொலநடுங்கிட்டாரு… ஆனா சுதாரிச்சுகிட்டு, வேட்டியில முடிச்சு வச்சிருந்த இரும்பு இடுக்கியை அந்தக் கையில நீட்டினாராம்.”
      “இரும்பு பட்ட உடனே அந்த பேயோட கை அலறி அடிச்சு, கத்திகிட்டு பறந்துச்சாம். அந்த நாள்ல இருந்து இன்னைக்கு வரைக்கும் அந்தாளு ராத்திரி எல்லாம் கையில இரும்பு பிடிச்சுக்கிட்டு தான் தூங்குறாரு…”

      அடிச்ச பானமெல்லாம் சிலருக்கு வியர்த்து ஒழுகிருச்சு. இது முடிவதற்குள் அரவிந்த் ஒரு கதை சொன்னான், 
      "டேய் இதுக்கே இப்படினா எங்க ஏரியாவுல நா ஒன்னு நேர்ல பாத்தேன்”
      “பத்தாவது ஸ்பெஷல் கிளாஸ் முடிச்சுட்டு நைட் 9 மணிக்கு எல்லாரும் கிளம்பினோம், பசங்க நிறைய பேரு கிளம்பிட்டாங்க, நாங்க ஒரு பத்து பேரு ஓரமா போய் திருட்டு தம் அடிச்சுட்டு கடைசியா கிளம்பலாம்னு பார்த்தோம்” 
      “அமாவாசை வேற, கரு கும்முன்னு இருந்துச்சு, பக்கத்துல இருக்க அய்யனார் கோவில்ல அடிக்கடி கிடாவெட்டு நடக்கும், ஆனா அன்னைக்கு என்னமோ ரத்த வாசம் காயாம பச்சையா இருந்துச்சு. ஏதோ உறுத்திட்டே இருந்துச்சு.. ரத்த வாசம் நெடி வீசுச்சு. என்னடா இதுன்னு எல்லாம் எங்களுக்குள்ளயே பேச ஆரம்பிச்சோம்” 
      “சரியான நேரம் பாத்து அந்த கோவில சுத்தம் பண்ற கிழவி எங்கள பாத்துட்டா, ‘சாமிங்களா... இன்னைக்கு வாசமே உக்கிரம்மா இருக்கு, கண்டிப்பா வேட்டை இருக்கு, நேரங்காலமா வீட்டுக்கு போங்க’-ன்னு சொல்லிட்டு போனா.”
      “மத்த நாள் சொல்லியிருந்தா நம்பியிருக்க மாட்டோம். ஆனா அன்னைக்கு அந்த ரத்த வாசம் எங்கள நம்ப வச்சுது”
      “கோவில் சிலையை பாத்துட்டே இருந்தோம், திடீர்னு ரத்த வாசம் போய் விபூதி வாசம் வந்துச்சு, பயந்து போய் உத்து பாத்தோம். சிலைக்கு பின்னாடி இருந்து யாரோ வெறி பிடிச்சு ஓடிப்போச்சு, மூஞ்சி தெரியல, ஆனா கண்ணு செக்க செவேல்னு இருந்துச்சு, அது கருப்பு தான்” 
      “அன்னைக்கு ஓடி போனவன் தான் நான். இன்னைக்கு வரைக்கும் தம் அடிக்க பயப்படுறேன்" 
      என்று பீர் அடித்துக் கொண்டே கதை சொல்லி முடித்தான்.

      இந்தக் கதை முடிந்தபோது நானும் வாசுவும் ஒருவரை ஒருவர் பார்த்துக்கொண்டோம். காரணம் நான் என் பத்தாம் வகுப்பு விடுமுறையில் வாசுவின் சொந்த ஊருக்குப் போயிருந்தேன் அல்லவா, அப்பொழுது நடந்த சம்பவம் இது. நானும் அவனும் அன்று நாகப்பழம் பறிக்கச் சென்று வீடு திரும்பவில்லை. பொழுது சாய்ந்தபின் எங்களை தேடி வாசுவின் அம்மாவே நேரில் வந்து, 
      "நேரமாச்சு, இன்னும் என்ன பண்றீங்க? வேலட்டு எல்லாம் ஒரு அளவுக்கு தான்"
      என்று திட்டியபடி வீட்டிற்கு கூட்டிச் சென்றாள். பயந்தபடி இரவு வரை எதுவும் நான் பேசவில்லை. விருந்தாளியாக வந்த பையனைத் திட்டிவிட்டோமே என்ற சோகத்தில் அம்மா என்னிடம் வந்து, 
      "அமுதா! அது ஒண்ணுமில்ல, இன்னைக்கு அமாவாசைல்ல.. அங்கே ரொம்ப நேரம் இருக்கக்கூடாது. அதான் திட்டீட்டேன். கோச்சுக்காதே. நாளைக்கு அதிரசம் பண்ணித்தரேன்னு"
      சொன்னாங்க. 
      "ஏன் இருக்கக்கூடாது?" என்று கேட்டேன். 
      "அது ஒண்ணுமில்ல, சின்ன வயசுல நடந்த கதை ஒண்ணு அதான்" 
      அப்படின்னு சொன்னாங்க. என்னவென்று கேட்டு நானும், வாசுவும், ஜெயந்தியும் (வாசுவின் தங்கை) அம்மாவின் பக்கம் அமர்ந்து கதை கேட்க ஆயத்தமானோம். 
      “நானும் என் ஆத்தாளுமா சுள்ளியப் பொறுக்க காட்டுக்குள்ள போயிருந்தோம். அப்ப திடீர்னு நிலம் ஆட்டம் குடுக்க ஆரம்பிச்சுட்டுச்சு. எனக்கு அப்ப பத்து வயசுதான், பயந்துபோய் என் ஆத்தாள கெட்டியா புடிச்சுக்கிட்டேன்! சலங்கையக் கட்டிட்டு யாரோ ஒருத்தன் ‘கணீருன்னு’ கத்திக்கிட்டே வெசயா போனான். உசுரே போயிருச்சு, பயத்துல நானே மயங்கிட்டேன். ஆத்தா என்ன தூக்கிக்கிட்டு ஊருக்குள்ள ஓடிச்சு வந்துட்டா. விஷயம் தெரிஞ்ச ஊர்காரங்க, ‘கருப்பு வேட்டைக்குப் போயிருக்கு, நீங்க பாத்தது மகா சக்தி, குடுத்து வச்சவங்க’ன்னு சொன்னாங்க. இத கேட்ட ஆத்தா ஊரையே கூட்டிக்கிட்டு கருப்பனுக்கேடா விருந்து போட்டார்.”
      "என்னதான் சாமியாயிருந்தாலும், நீங்க பயந்துருவீங்க. அதான் ஏசிப்புட்டேன், கவலை படாதீங்க”ன்னு கூறினாள்.
      இதைக் கேட்டு நானும் வாசுவும் கம்பளியை இறுக்கப் போர்த்தி கருப்பனிடமிருந்து தப்பித்துத் தூங்கிய நினைவு இன்றும் நினைவில் உள்ளது.

      இவ்வாறு பல கதைகள் பேசி எல்லாரும் ஒரு வழியாக தூங்க சென்றோம். வாசுவின் ஊர் நினைப்பாகவே தூங்கினேன். என் நினைவில் வள்ளியும் வந்து போனாள். [ வள்ளியை பற்றி நீங்கள் வள்ளியின் தாஜ்மஹால் அத்தியாயத்தில் காண்பீர்கள் ] மறுநாள் விடியற்காலையில் வாசுவின் வீட்டில் இருந்து அழைப்பு வந்தது: "ஜெயந்திக்கு உடம்பு சரியில்லை, கொஞ்சம் சீக்கிரம் வா" என்று. என்னவென்று தெரியாமல் அவசரமாகக் கிளம்பிக்கொண்டு இருந்தான் வாசு. தூக்கத்தில் முழித்த நானும், என்னவென்று கேட்க, அவன் அவசரத்தில் நிதானம் இன்றி ஏதோ சொன்னான். எனக்கும் அவனைத் தனியாக அனுப்ப மனமில்லை. நானும் விரைந்து கிளம்பி, இருவரும் ஒன்றாக ஊருக்குச் சென்றோம். காய்ச்சல் அல்லது ஏதேனும் வைரஸ் தொற்றாக இருக்கும் என்று நினைத்த எதுவும் அறியாமல் நாங்கள் பயணித்துக் கொண்டிருந்தோம். அவன் மனதிலும் ஏதேதோ பயம் வரத் துவங்கியது. "ஒருவேளை சொல்லாம கொள்ளாம ஓடிப் போயிருப்பாளோ?" என்று அவன் கேட்டான். "பார்த்துக்கலாம் வா" என்றேன். ஆனால், நானோ மருத்துவ ரீதியாகப் பயந்துகொண்டிருந்தேன்; ஏதேதோ நோய்களைப் பற்றி அஞ்சினேன். பெண்கள் மத்தியில் சாதாரணமாக உலவும் நோய்களைப் பற்றியெல்லாம் இணையதளத்தில் தேடினேன், அதற்கெல்லாம் அருகாமையில் சிறந்த மருத்துவம் எங்கே கிடைக்கும் என்றெல்லாம் பார்த்து வைத்தேன். நேற்றைய இரவின் போதை முழுவதும் தெளியாமல் கண் இருக்கமாக இருந்தது. ஒரு வழியாக அடித்துப் பிடித்து மருத்துவமனையை அடைந்தோம். எங்களைப் பார்த்ததும் அம்மாவும் அப்பாவும் ஓடி வந்து வாசுவைக் கட்டிப்பிடித்து அழத் துவங்கினார்கள். நான் சுற்றிமுற்றிப் பார்த்தேன்; காவல்துறையார் எல்லாம் இருந்தனர். பயதில் என்னவென்று தெரியாமல் தலையே சுற்றிவிட்டது. மௌனமாய் நகர்ந்து காவலரிடம் சென்று என்ன ஆனதென்று கேட்டேன். 
      “நீ யாருடா கேட்க?” என்று கத்தினார், கோபத்துடன்.
      “ஜெயந்தியின் அண்ணன்”
      “வீட்டுக்காரனுவதான் எங்களுக்கத் தகவ சொல்லோணும், நாங்க உனக்குச் சொல்ல வேண்டியதிருக்கா? என்ன மசுரு அண்ணன் நீ? உன் தங்கச்சி காலங்காத்தால முள்ளுக்காட்டுப் பக்கத்துல மயங்கிக் கெடந்திருக்கா. அந்த வழியாப் போன புள்ளைங்க பாத்துத் தகவக் குடுத்தானுவ. இங்க வந்தப்புறம்தான் தெரியுது, ஜெயந்திய யாரோ வன்புணர்வு பண்ணியிருக்கானுவ. புள்ளய என்ன மசுருக்கு அன்னேரத்துக்கு வெளிய அனுப்புனீங்க? எங்க தாலிய அறுக்கவே பெத்துப் போட்டிருக்கீங்களாடா?” என்றான் மிக மிகச் சினத்துடன்.
      இதயம் ஒரு நொடி நின்றது, சற்றும் எதிர்பார்க்கவில்லை. இதையே அம்மாவும் அப்பாவும் வாசுவிடம் சொன்னார்கள் போலும், வாசு மயங்கியே விட்டான். நேற்றிரவெல்லாம் குடித்துவிட்டு, தூங்காமல் நெடுந்தூரம் பயணம் செய்து வந்து இந்தச் செய்தியை கேட்டதால், அவனின் உடல் ஒத்துழைக்கவில்லை போலும். அவனுக்கு ட்ரிப்ஸ் ஏற்ற வேண்டியதாகிவிட்டது. காவல்துறை ஒரு பக்கம் குற்றவாளி யார் என்று விசாரணை புரிந்துவந்தனர். ஜெயந்தி மற்றும் வாசுவின் நிலை ஒருபுறம், துயரிலிருக்கும் அவர்களின் பெற்றோரின் நிலை மற்றொருபுறம் என அப்படியொரு சூழல் இருக்கையில், காப்பீட்டு அட்டை ஒன்றை எடுப்பதற்காக, நான் அவர்களின் உறவினர் ஒருவருடன் அவர்கள் வீடு வரை செல்ல வேண்டிய கட்டாயம் ஏற்பட்டது. வீட்டுக்குச் சென்று மீண்டும் மருத்துவமனைக்குத் திரும்பும் வழியில், அந்த முள்ளுக்காடு வழியாகப் போக வேண்டும் என்ற எண்ணம் திடீரென வந்தது. அதனால் வழியிலேயே இறங்கிவிட்டேன். அவர் மருத்துவமனைக்குத் துரிதமாகச் சென்றபோது, நான் அந்தக் காட்டுக்குள் தனியாக நடந்தேன். சிறுவயதில் நாங்கள் நாவப்பழம் பொறுக்கச் சென்ற அதே காடு தான் அது, நினைவுகளின் நிழல்கள் இன்னும் மரங்களுக்கிடையே உலாவிக் கொண்டிருந்தன. ஆனால், ஏனோ எந்தக் கருப்பும் வரவில்லை ஜெயந்தியைக் காப்பாற்ற, வாசுவின் தாயாருக்குக் கேட்ட அந்தக் 'கணீர்' குரலும் எனக்குக் கேட்கவில்லை, கேட்பதெல்லாம் தங்கையின் அலறல் ஒன்றுதான். 

      “மயில் தோகை படினே சிவக்கும் பெண் மேனியில்
      விலாசம் இன்றி வசிக்கும் பல ஆண்களின் கைரேகை”


      இயற்கையின் அதீத ஆற்றல்களை வானம் தன் வசப்படுத்தி வைத்திருக்கிறது. பூமியின் மேல் அளவற்ற அன்பையும் கோபத்தையும் அந்த வானம் வெளிப்படுத்துவதுண்டு. உணவையும் புணர்ச்சியையும் சுவைத்து சலித்த ஆதி மனிதன், வானத்தைக் கூர்ந்து நோக்கி, தினமும் நிகழும் விண்மீன் மாற்றங்களைக் கண்டறிந்து, கணக்கிட்டு, ஒவ்வொன்றுக்கும் பெயரிட்டு, விண்ஞானத்தைக் கண்டறிந்தான், அந்த வானத்தில் கண்டறியாத கடவுள் வசிப்பதாகவும் நம்பத் துவங்கினான். எப்போதெல்லாம் இந்தப் பூமியின் சமநிலைகள் மாறுபடுகிறதோ, அப்போதெல்லாம் வானத்தில் இருந்து ஏதோ ஒன்று இறங்கி வரும். சான்றாக, இங்கே நிலம் வறண்டு போகுமானால் மழை இறங்கி வரும், குளிர் உறைக்கும் பொழுதில் வெயில் இறங்கி வரும். அவ்வளவு ஏன்? டைனோசர்கள் இல்லாத பூமியில்தான் இந்த மனிதர்கள் பரிணாம வளர்ச்சி அடைய முடியும் என்று எரிக்கல்லைத் தூவி டைனோசர்களை இந்த வானம் அழிக்கத் துவங்கியதாக அறிவியல் சான்றுகளும் இருக்கின்றன. வானம் கடவுளுக்கு ஒப்பாகப் பார்க்கப்படுகிறது. கண் மிதவைகளைப் பார்த்திருப்போம், விடாமல் துரத்தி வரும் வெண்ணிலவைப் பார்த்திருப்போம், ஆதியந்தம் கண்டறிய முடியாத வானவில்லைப் பார்த்திருப்போம், குடியரசு தினத்திலும் சுதந்திர தினத்திலும் உயரே பறக்கும் மூவர்ணக் கொடிகளைப் பார்த்திருப்போம், நாளிடையில் பலவண்ணச் சேர்க்கைகளில் பறக்கும் பல வர்க்கத்தின் கொடிகளைப் பார்த்திருப்போம், மாடப்புறாக்களும், காகங்களும், பருந்துகளும் பார்த்திருப்போம். பருந்தை விடவும் உயரே பறக்கும் விமானங்களைப் பார்த்திருப்போம். அவ்வாறான விமானத்தில் பறந்து மேகங்களைத் தொட்டுப் பார்க்க ஆசை கொண்டிருப்போம், அந்த ஆசைகள் பேராசைகள் கொள்ளும்படியாக அந்த விமானத்தை ஓட்ட ஆசைப்பட்டவன் தான் எழிலன்.
      எழிலன் தனது பத்தாம் வகுப்பு விடுமுறையில் இருந்தே இதற்காகப் படிக்கத் தொடங்கிவிட்டான். எப்படியோ இந்திய விமானப்படையின் நுழைவுத் தேர்வில் தேர்ச்சி பெற்று இத்தனை வருடங்களை இந்த சூலூர் விமான தளத்தில் பயிற்சி பெற்று கடந்துவிட்டான். மீதமுள்ள சோதனை ஓட்டத்தில் தேர்ச்சி பெற்றுவிட்டால் எழிலன் இந்திய விமானப்படையின் பணியாளர். இந்தப் பயிற்சி காலத்தில் அவன் இழந்தவற்றை எதைக்கொண்டும் ஈடு செய்ய முடியாது. பயிற்சிகாலத்தின் இடையில் அவனது தந்தை இயற்கையெய்தினார், ஆனால் அவனால் நான்கு நாட்கள் சேர்ந்தது போல் விடுப்பெடுத்து வீட்டில் இருக்க முடியவில்லை. எத்தனையோ பணத்தையும் செலவழித்திருக்கிறான், அது அல்லாது ராகவியுடன் ஆன நேரத்தையும் அவன் தியாகம் செய்திருக்கிறான். ராகவி எழிலனின் காதலி, சிறுவயது காதலி. சொல்லப்போனால், எழிலனிடம் ஒரு நாள் ராகவி தற்செயலாக அவளுக்கு விமானத்தில் போக ஆசை உள்ளதைக் கூறினாள். இது அவள் சொன்னபோது ஒரு பதின்மூன்று, பதினான்கு வயது இருக்கும். எழிலனும் ராகவியைத் தான் அழைத்துச் செல்வது மட்டுமல்லாமல், தானே விமானத்தை ஓட்டிப் போவதாகவும் உறுதியளித்தான். பயணிகள் விமானத்தை ஓட்ட பெரும் பொருட்செலவாகும், விமானப் படையில் சேர நுழைவுத் தேர்வில் தேர்ச்சி அடைந்துவிட்டால் மீதத்தை எப்படியானாலும் பார்த்துக் கொள்ளலாம் என்று தெரிந்தது. ஆகையால் தான் எழிலன் சிறுவயதிலிருந்தே நன்கு படித்து பயிற்சியில் நுழைந்தான். இறுதிச் சுற்றுக்கான தேதியும் அறிவிக்கப்பட்டது. கொடுக்கப்பட்ட அந்தத் தேதியின் முந்தைய நாள் ராகவியும் எழிலனும் ஒரு தேநீர்க் கடையில் சந்தித்துக் கொண்டனர். ராகவி ஓர் அழகிய பூங்கொத்துடன் வந்திருந்தாள், அதை எழிலன் பெற்றுக் கொண்டான். டியூலிப் மலர்கள் நிறைந்து இருந்தன. அதன் நடுவே "எழிலன்" என்று சீருடைப் பாணி பெயர்ப்பட்டை இருந்தது. அவள் அதை கைப்படச் செய்திருந்தாள் போலும். எழிலன் அதைக் கவனித்ததும் அவளைக் கட்டி அணைத்தான். இருவரும் கதைகள் பேசி விடைபெற்றனர். அடுத்த சந்திப்பில் எழிலன் விமானி ஆகி இருப்பான். தனது சிறுவயதின் ஆசைக்காக எழிலன் இவ்வளவு தூரம் வந்திருக்கிறான் என்று ராகவி பேரின்பம் கொள்ளாத நாளே இல்லை. இன்று விடைபெற்ற எழிலன் நடந்து போகிறான், நாளை பறந்து வருவான் என்ற பெருவுணர்ச்சியுடன் ராகவி செல்கிறாள். எழிலன் தனது விடுதிக்குச் சென்று ராகவி கொடுத்த பூங்கொத்தை மணக்க மணக்க ஒரு முறை நுகர்ந்து மேசை மீது வைத்து உறங்கச் சென்றான். அவன் உறக்கம் கொண்ட நேரத்தில் வேறு ஒன்று அங்கே விழித்துக் கொண்டது, அது பூங்கொத்தின் நடுவே இருந்து, வளைந்து நெளிந்து வெளியே வரத் துவங்கியது, வேறு என்ன? பூநாகம் தான். மேல மெல்ல மேஜை மேலே ஊர்ந்து, அங்கும் இங்கும் சென்று, அலமாரியில் மாட்டி வைத்திருந்த பைலட் ஜாக்கெட் உள்ளே நுழைந்தது. அதனிடம் யார் சென்று சொல்வது? அந்த மேல் சட்டை நாளை எழிலன் அணிந்து பறக்கவுள்ளான் என்பதை, கதகதப்பைத் தேடிச் செல்லும் நாகம் நாளை எழிலை என்ன செய்யவுள்ளதோ? 
      அதிகாலை மூன்று மணி அலாரம் அடிக்கிறது. எழிலனும் விழிக்கிறான். விடியலை நோக்கி கடிகாரமும், வெளிச்சத்தை நோக்கி எழிலனும் தயாராகினர். நீராடிய பின்னர் அவன் ஒவ்வோர் உடைகளையும் அணிகலன்களையும் அணியத் துவங்குகிறான். கடைசியாக அந்த பைலட் ஜாக்கெட்டையும் அணிகிறான். அந்த நாகம் இன்னும் உள்ளதா? இல்லையேல் போய்விட்டதா? தெரியவில்லையே. ஓடு தளம் சென்று அதிகாரிகளின் கலந்துரையாடலுக்குப் பின்னர் தனது தலைக்கவசத்துடன் தனக்காகக் காத்திருந்த ஜெட் விமானத்தை நோக்கி செல்கிறான். விமானத்திற்கும் அவனுக்கும் உள்ள தூரத்தை, அவன் வாழ்க்கையின் அடுத்த கட்டத்திற்கும் அவனுக்கும் உண்டான இடைவெளியாகக் காண்கிறான். ஜெட் அருகே சென்று அதன் முன்னே நின்று தலைக்கவசத்தைக் கீழே வைத்து, தரையோடு விழுந்து தொழுகிறான். கடவுளைப் பிரார்த்தித்து, முதல்கட்டச் சோதனைகளை முடித்து உள்ளே சென்று அமர்ந்து ஹெல்மெட் அணிகிறான். இது வரை அவன் கொள்ளாதவாறு நடுக்கம் கொண்டு இருக்கிறான். இதோ மனதில் ஒரு நிறுத்தக் கடிகாரம் ஆரம்பிக்கிறது, மூன்று, இரண்டு, ஒன்று... "ignite.." "runway clear" "takeoff" எனக் கண மணித்துளிகளில் வானத்தில் பாய்கிறான். அது விடியலுக்கான நேரம். பூமியில் இருந்து பார்த்தால் வானில் இருள். அவன் மேலே பறக்கப் பறக்க வெளிச்சத்தைக் காண முடிகிறது, முன்னமே சொன்னது போல் வாழ்க்கைகான வெளிச்சம்.
      தான் செய்ய வேண்டிய கடமைகளில் முனைப்புடன் இருந்தான் எழிலன். அதிவிரைவாக, கவனமின்றி ரேடார்களைப் பார்த்தபடி பறந்து கொண்டிருந்தான். திடீரென்று நெஞ்சில் ஏதோ ஊர்வது போலத் தோன்றியது. கை வைத்து நீக்கிப் பார்த்தான், அது போகவில்லை. அவன் நீக்கியவுடன் கழுத்தில் ஏதோ கடித்தது போல வலி கொண்டான். கண நேர மணித்துளிகளில், தலைக்கவசத்திற்குள்ளும் புகுந்து, எழிலனின் முகத்தின் மேல் விழுந்து அவனது பார்வையில் பட்டது பூநாகம். ஒரு நிமிடம் செய்வதறியாமல், இரண்டு கைகளாலும் வேகமாகத் தலையை அடித்துக்கொண்டான். ஆனால் அது அவனது மூக்கின் மீதும் அங்கேயும் இங்கேயும் ஊரத் துவங்கியது. நிதானம் இழந்த எழிலன் வேகமாகத் தலையைச் சிலிர்த்தான். இவையெல்லாம் சில மணித்துளிகளில் நிகழ்ந்தவை. சட்டென விமானம் கட்டுப்பாட்டை இழந்தது. சுதாரித்த எழிலன் அதைத் தன் கட்டுப்பாட்டிற்குள் எடுப்பதற்குள் கைமீறிப் போய்விட்டது. விமானம் மேலிருந்து கீழே செங்குத்தாக விழத் துவங்கியது. உயரம் குறைந்து கொண்டே இருக்க, அவசர சைரன் ஒலிக்கத் துவங்கியது. வேறு வழியில்லாமல் எழிலன் தானியங்கி வெளியேற்றும் நெம்புகோலை (automatic ejection liver) இழுத்தான். விமானத்தின் மேல் கூரை திறக்கப்பட்டு விமானி இருக்கையுடன் வானில் வீசப்பட்டான். கவலைப்பட வேண்டாம், அது கீழே விழுகையில் எழிலன் பாராசூட் (Parachute) திறந்து தப்பித்துக் கொள்வான். அவனுக்குச் சேதம் ஆகாது. மேலே தான் கண்ட வெளிச்சம் கீழே வர வர இருள் ஆவதைக் காண்கிறான். அதைத் தனது எதிர்காலம் போல் உவமையாகக் கொள்கிறான். அது இருக்கட்டும், விமானம் கீழே வந்ததல்லவா. அது நகர்ப்புறத்தின் ஓரத்தில் அமைந்திருந்த சாலையின் புதர்க் காட்டில் விழுந்து வெடித்தது. அதிலிருந்து ஒரு மைல் தொலைவில் எழிலன் பாராசூட்டில் தரையிறங்குகிறான். நல்லவேளையாக, ஆட்கள் நடமாட்டம் இருக்கும் ஒரு மத்திய சாலையில் அவன் விழுந்தான். ஆகையால் அவனை உடனடியாக மீட்டு மருத்துவமனைக்கு அழைத்துச் செல்ல ஆட்கள் இருந்தனர். விமானம் வெடித்த அப்பகுதியில் அடுத்த சில நிமிடங்களில் காவல்துறை, தீயணைப்பு, மீட்புப் பணியினர் அனைவரும் விரைந்து வந்து முதல்கட்ட மீட்புப் பணியைத் துவங்கினர். தீயணைப்புத் துறையினர் ஒருபுறம் தீயை அணைக்க, மறுபுறம் மீட்புப் பணியினர் ஏதேனும் உயிர் சேதம் உள்ளதா என்று ஆய்வுகள் நடத்தினர். அவ்வாறு பார்க்கையில் தான் விமானம் விழுந்ததில் இருந்து ஒரு கால் மைல் தொலைவில் குப்பை மேட்டில் மயங்கிக் கிடந்த என்னை மீட்டு மருத்துவமனையில் அனுமதித்தனர்.

  - id: vet_kar
    timeline: 4
    titleEn: Vettakkaruppu
    title: வேட்டக்கருப்பு
    location:  Hyderabad / Banglore / Chennai , Kittangudi
    characters:

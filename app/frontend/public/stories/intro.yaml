title: |
  முன்னுரை

content: | 
  இந்த கதை துவங்கிய அன்றைய நாளில் நான் அரைக்கால் டவுசர் அணிந்த சிறுவன். சமூகத்தின் எந்த மூர்க்கத்தனங்களுக்கும் உட்படாமல் புத்தகப்பை அன்றி வேறு சுமை அறியாதவன், சுமக்காதவன். இவையெல்லாம் அந்த ஒரு நபரை நான் பார்க்கும் வரைதான். என் வெள்ளந்தி வாழ்வின் முதல் கருப்புக்கோடு அவன் வரைந்தது. சிலேட்டு குச்சிகளின் வெள்ளை கிறுக்கல் மட்டுமே கண்ட என் கரும்பலகைகள் கூரான ஒரு செந்நிற கோட்டினை கண்டதும் அவனால்தான். பால்ய கால நாள் ஒன்றில், பள்ளி சீருடையுடன் வீடு திரும்புகையில், தூரத்து தேநீர் கடை வாசலில் அவனை முதல் முறை கண்டேன். அவன் எனக்கு துளியும் அறிமுகம் இல்லாத மனிதனாகவே இருந்தான். அவன் கையில் சிகரெட்டோ மது குப்பியோ எதுவும் இல்லை, தேநீர் மட்டும் தான் இருந்தது, அவன் அச்சுறுத்தவில்லை, அவனிடம் அமைதி இருந்தது, அந்த அமைதி எனக்கு பெரும் இரைச்சலை கொடுத்தது. நான் எதையோ நினைத்து அவனை உற்று நோக்கிக்கொண்டு இருந்த அதே நேரத்தில் திடீரென அவனும் என்னைப் பார்த்தான், உறைந்து விட்ட நான் செய்வதறியாமல் நின்றேன். அவன் என்னை பற்றி ஏதோ நினைக்க துவங்கினான் என்று உணர்ந்து அங்கிருந்து வேகமாக நகர துவங்கினேன். அவனை கடந்து செல்லும் படியாகத்தான் நான் நடந்து வந்த பாதை இருந்தது, அன்று எதுவும் புரியாமல் ஒரு பெரும் பாரத்தை சுமந்து கொண்டு அவனை விரைவாக கடந்து சென்றேன். நான் வந்த பாதை அவனைக் கடந்து செல்வதாக இருந்தது. அன்று எதுவும் புரியாமல், ஒரு பெரிய பாரத்தைச் சுமந்துகொண்டு, நான் விரைவாக அவனைக் கடந்து சென்றேன். அவன் யாரென்றே எனக்கு தெரிந்திருக்கவில்லை. அவன் யாரென்று எனக்குத் தெரியவில்லை, அவனைப் பற்றி எதுவும் அறிந்திருக்கவில்லை. அப்படியிருந்தும், அஞ்சினேன். என் வாழ்வில் அவன் போல் மாறிவிடக் கூடாது என்று பயந்தேன். அவன் போல் மாறி விட வேண்டாம்! வேண்டவே வேண்டாம். 
  இன்று என் இருபதுலகின் இடையில் வாழ்ந்து வருகிறேன். யோசித்துப் யோசித்துக் ஆண்டுகள் கடந்தன, அவன் அப்படி என்ன செய்ய நான் அவனாக இருக்க வேண்டாம் என்று முடிவெடுத்தேன் என்று, பதில் கிடைக்கவில்லை, இன்று வரை யோசிக்கிறேன். ஒரு நாள் வந்தது, பதிலோடு. தற்செயலாக ஒரு தேநீர் கடையில் தேநீர் பருகுகையில் திடீர் என்று இந்த சம்பவம் என் நினைவை கடக்க, கடைவாசலுக்கு சென்று எட்டி பார்த்தால், ஒரு சிறுவன் பள்ளி சீருடையில் என் வருகைக்காக தூரத்தில் காத்திருந்தான் போலத் தெரிந்தது. ஏதோ யோசித்த அவன், வேகமாக என்னை கடந்தான். என்னை அவன் கடந்து சென்றபோது அவன் கண்ணில் பயம் கண்டேன், என்னைப் பார்த்து ஏன் அவன் அச்சம் கொள்ள வேண்டும், நான் என்ன செய்தேன் அவனை? இன்று தான் புரிகிறது, நானே அவன், அவனே நான். நான் நானாக இருக்க வேண்டாம் என்று நானே என்னிடம் முன்னாளில் வந்து உணர்த்தி இருக்கிறேன்.
  நான் நாணயத்தின் இரு பக்கத்தில் ஒன்றாக என்றென்றும் வாழ நினைத்ததில்லை, மாறாக அந்த நாணயமாக வாழ நினைத்தேன், அதை சுமக்கும், யாசிக்கும் கைகளாக, அது வந்து விழும் யாசக தட்டாக, சில சிறுவர்கள் தண்டவாளத்தின் மேல் வைத்து உடைக்கும் விளையாட்டுப் பொருளாக, அதையும் துண்டாக்கி செல்லும் ரயிலாக, அதே ரயிலில் வேறு சில சிறுவர்கள் விற்ற பலூனின் விலையாக, அச்சிறுவர்களின் பசியை போக்கும் உணவாக இருக்கவும் வாழவும் விரும்பினேன். ஆனால் எப்படியோ புழக்கத்திற்கு வந்த செழித்த 500 ரூபாயாகா அச்சிடப்பட்டு பின்னாளில் செல்லாத தாளாய் அறிவிக்கப்படும் வடிவம் பெற்றவன். நீங்களும் நானும் பயணிக்கும் இலக்கு ஒன்று தான், பயணத்தில் வேறுபாடு உண்டு. நீங்கள் பயணிக்கும் அதே பேருந்தில் நானும் பயணிக்கிறேன். ஆனால் ஒவ்வொரு பயணத்திலும் ஏதோ ஒரு குடும்பம் ஒன்றாய் அமரவும், தனியாக பயணிக்கும் பெண்மணி பத்திரமாக அமரவும், மதுப்பிரியர்கள் விசாலமாக வாந்தி எடுக்கவும், சில காதலர்கள் ரகசியமாக காதல் பேசவும் காதல் செய்யவும், முட்டி வலி கொண்டவர்கள் கால் நீட்டி அமரவும், நான் என் சன்னல் இருக்கையை தியாகம் செய்து கடைசி வரிசையின் நடு இருக்கையில் அமரும் வாடிக்கை வேடிக்கையாக நிகழ்வது இயல்பு. இதை படிக்கும் நேரத்தில் நீங்கள் பேருந்தில் பயணம் செய்து கொண்டு இருந்தால் கடைசி இருக்கையை திரும்பி பாருங்கள், நான் அங்கு அமர்ந்து இருக்கும் வாய்ப்புகள் அதிகம். நான் நடக்கும் பாதைகளில் நட்சத்திரங்கள் காலில் குத்துகின்றன. துணை வருமென்று நம்பி இருட்டில் நடக்கையில் தனியே விட்டு மறைகிறது பௌர்ணமி நாட்களிலும் முழுமதி, என்றாலும் நாளை வருவாள் என்ற நம்பிக்கையில் நடக்கிறேன், தலைவிதி. மறக்க நினைக்கும் நினைவுகளை 70.எம்.எம் திரையிட்டு தினமும் காட்டுகிறது கனவு. பதக்கங்கள் பெரிதாய் வாங்கியது இல்லை. பரிசுகள் பெறும் வாடிக்கையும் இல்லை. காதலில் வாங்கிய பரிசெல்லாம் கண்ணீர் மட்டும் தான். காதலிகளின் திருமணத்தை முதல் வரிசையில் நின்று பார்க்கும் கதாநாயகன் நான். பிடித்த நிறம் என்று ஏதும் இருந்ததில்லை, பிடித்த சுவை மறுமுறை உண்ணும் பாக்கியம் இல்லை. எழுத்துப்பிழை இன்றிக் கவிதை எழுதும் திறமை இன்றுவரை இல்லை. அழகியலைக் காட்டிலும் அரசியல் ஆர்வம். 
  ஆயிரம் ஓட்டைகள், ஆயினும் எண்ணில் வழியாமல் நிறைந்துள்ளுளாய், தமிழே. உணவில்லாமல் பசியுடன் இருந்துள்ளேன், பணம் இல்லாமல் இருந்துள்ளேன், உறங்க முறையான இடம் இல்லாமல், பெற்றோர் உடன் இல்லாமல், துணை இல்லாமல்,  காதல் இல்லாமல், உற்றார் உறவினர் இல்லாமல், ஒரு மனிதனின் அன்றாடத் தேவைகள் என்னவெல்லாமோ அவையெல்லாம் இல்லாமல் இருந்துள்ளேன், ஆனால் ஒரு நாளும் தமிழ் இல்லாது இருந்ததில்லை. அறம் கற்பித்து, அரசியல் போதித்து, என் கோபங்களைச் சாந்தப்படுத்தி, என் மௌனங்களை ரௌத்திரம் ஆக்கி, என் காதலுக்குக் கவிதைகளைக் கொடுத்து, கவிதையின் மேல் காதலும் கொடுத்துள்ளாய். எதிர்பார்ப்புகள் இன்றி நான் எழுதும் நாவல், கதை, கட்டுரை, கவிதை இல்லையேல் கிறுக்கல் இது. எந்தன் "அமுத புராணம்"
